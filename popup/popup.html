<!DOCTYPE html>

<html>

<head>
    <meta charset="UTF-8">
</head>

<body>

    <input id="baseUrl"
           placeholder="https://chatgpt.com">

    <select id="mode">

        <option value="number">
            숫자
        </option>

        <option value="text">
            문자
        </option>

        <option value="mix">
            혼합
        </option>

    </select>

    <input id="length"
           value="4">

    <input id="interval"
           value="10">

    <label>
        뒷 주소
    </label>

    <input id="suffix"
           placeholder="/test">

    <button id="save">
        저장
    </button>

    <button id="start">
        시작
    </button>

    <button id="stop">
        정지
    </button>

    <button id="jump">
        즉시 이동
    </button>

    <script type="module"
            src="popup.js">
    </script>

</body>

</html>
