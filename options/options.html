<!DOCTYPE html>

<html>

<head>

    <meta charset="UTF-8">

    <style>

        body {
            padding: 20px;
            max-width: 600px;
        }

        input,
        select {
            width: 100%;
            margin-bottom: 12px;
        }

        button {
            margin-right: 10px;
        }
    </style>

</head>

<body>

    <h2>

        설정

    </h2>

    프로필 선택

    <select id="profileList">

        <option value="">
            새 프로필
        </option>

    </select>

    <br>

    프로필 이름

    <input id="profileName">

    <br>

    주소

    <input id="baseUrl">

    <br>

    모드

    <select id="mode">

        <option value="number">

            숫자

        </option>

        <option value="text">

            문자

        </option>

        <option value="mix">

            혼합

        </option>

    </select>

    <br>

    길이

    <input id="length"
           value="4">

    <br>

    간격

    <input id="interval"
           value="10">

    <br>

    뒷주소

    <input id="suffix">

    <br>

    <button id="save">

        저장

    </button>

    <button id="delete">

        삭제

    </button>

    <script type="module"
            src="options.js">

    </script>

</body>

</html>
