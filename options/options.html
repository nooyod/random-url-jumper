<!DOCTYPE html>

<html>

<head>

    <meta charset="UTF-8">

    <title>설정</title>

    <style>

        body {
            font-family: sans-serif;
            padding: 20px;
            max-width: 700px;
        }

        label {
            display: block;
            margin-top: 10px;
        }

        input,
        select {
            width: 100%;
            padding: 6px;
            box-sizing: border-box;
        }

        button {
            margin-top: 10px;
        }

        #status {
            margin-top: 10px;
        }

        .hidden {
            display: none;
        }
    </style>

</head>

<body>

    <h2>프로필 설정</h2>

    <label>

        프로필 선택

        <select id="profileList">

            <option value="">
                새 프로필
            </option>

        </select>

    </label>

    <label>

        프로필 이름

        <input id="profileName">

    </label>

    <label>

        주소

        <input id="baseUrl">

    </label>

    <label>

        생성 방식

        <select id="generator">

            <option value="random">

                랜덤 생성

            </option>

            <option value="crawl">

                목록 기반 랜덤

            </option>

        </select>

    </label>

    <div id="crawlArea">

        <label>

            목록 주소

            <input id="listUrl">

        </label>

        <label>

            게시글 선택자

            <input id="linkSelector"
                   value="a">

        </label>

        <label>

            번호 추출 방식

            <select id="extractMode">

                <option value="path">

                    마지막 숫자

                </option>

                <option value="param">

                    URL 파라미터

                </option>

                <option value="regex">

                    정규식

                </option>

            </select>

        </label>

        <label>

            파라미터명

            <input id="paramName"
                   value="number">

        </label>

        <label>

            정규식

            <input id="regex"
                   placeholder="number=(\d+)">

        </label>

        <button id="refreshIds">

            목록 새로고침

        </button>

        <div id="status">

            0개 수집됨

        </div>

    </div>

    <label>

        문자 생성 방식

        <select id="mode">

            <option value="number">

                숫자

            </option>

            <option value="text">

                문자

            </option>

            <option value="mix">

                혼합

            </option>

        </select>

    </label>

    <label>

        길이

        <input id="length"
               value="4">

    </label>

    <label>

        간격

        <input id="interval"
               value="10">

    </label>

    <label>

        뒷주소

        <input id="suffix">

    </label>

    <button id="save">

        저장

    </button>

    <button id="delete">

        삭제

    </button>

    <script type="module"
            src="options.js">

    </script>

</body>

</html>
